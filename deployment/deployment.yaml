apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx-app
        image: nginx:1.14.2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata: 
  name: java-app-service
  labels:
    app: nginx-app
spec:
 selector:
   app: nginx-app
 ports:
   - port: 80
     targetPort: 8080
 type: LoadBalancer
